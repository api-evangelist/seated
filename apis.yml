apis:

  - aid: seated:artist-api
    name: Seated Artist API
    description: >
      The Seated Artist API enables developers and artist teams to build custom
      integrations with the Seated platform. The API provides access to tour date
      listings and event data, supporting use cases such as embedding event listings
      on artist websites, syncing fan notifications, and connecting with third-party
      marketing platforms. Authentication is handled via a Bearer token issued to
      artist accounts through the Seated platform. The API base URL is api.seatedapp.io
      and responses are returned as JSON. Artists without custom integration needs can
      use the single-line JavaScript embed to publish tour dates on their websites.
      The API also supports fan data capture, presale management, and integration with
      the Seated integrations marketplace launched in 2024 for connecting fan data to
      marketing tools.
    humanURL: https://www.seated.com/artists
    baseURL: https://api.seatedapp.io
