aid: seated
name: Seated
description: >
  Seated is a live event discovery and direct ticketing platform that connects fans
  with artists through a frictionless ticketing experience. The platform enables artists
  to publish tour dates via a single embed line or a custom API integration, manage
  fan presales and waitlists, capture and sync fan data with marketing tools, and
  generate additional revenue through merchandise and digital content bundled into
  the ticket purchase flow. Fans can follow favorite artists to receive text or
  notification alerts for nearby shows, purchase tickets via mobile without downloading
  an app, and access live event information for music and entertainment. Seated serves
  independent artists and major touring acts including Noah Kahan, Shawn Mendes,
  Brandi Carlile, Post Malone, and Billie Eilish, operating as an independent
  founder-led company focused on direct artist-to-fan ticketing.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
